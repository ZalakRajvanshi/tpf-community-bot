# Render Blueprint — deploys the bot as a Python Web Service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tpf-community-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # Slack user ID of the Human POC who receives all DMs.
      - key: HUMAN_POC_USER_ID
        sync: false
      # Shared secret protecting the /tasks/daily-digest trigger.
      - key: DIGEST_TRIGGER_TOKEN
        sync: false
      # Hours of history the digest covers (safe to commit a default).
      - key: DIGEST_WINDOW_HOURS
        value: "24"
